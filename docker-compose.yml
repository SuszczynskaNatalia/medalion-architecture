x-airflow-common: &airflow-common
  build: .
  env_file: .env
  environment:
    # ── Airflow core ─────────────────────────────────────────────────────────
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}

    # ── Snowflake ─────────────────────────────────────────────────────────────
    SNOWFLAKE_ACCOUNT:   ${SNOWFLAKE_ACCOUNT}
    SNOWFLAKE_USER:      ${SNOWFLAKE_USER}
    SNOWFLAKE_PASSWORD:  ${SNOWFLAKE_PASSWORD}
    SNOWFLAKE_DATABASE:  ${SNOWFLAKE_DATABASE}
    SNOWFLAKE_SCHEMA:    ${SNOWFLAKE_SCHEMA}
    SNOWFLAKE_WAREHOUSE: ${SNOWFLAKE_WAREHOUSE}
    SNOWFLAKE_ROLE:      ${SNOWFLAKE_ROLE}

    AIRFLOW_CONN_SNOWFLAKE_DEFAULT: "snowflake://${SNOWFLAKE_USER}:${SNOWFLAKE_PASSWORD}@/${SNOWFLAKE_SCHEMA}?account=${SNOWFLAKE_ACCOUNT}&database=${SNOWFLAKE_DATABASE}&role=${SNOWFLAKE_ROLE}&warehouse=${SNOWFLAKE_WAREHOUSE}"

    # ── Kafka (używane przez taxi_streaming_cli.py) ───────────────────────────
    KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    KAFKA_TOPIC:             nyc_taxi_events
    KAFKA_CONSUMER_TIMEOUT_MS: "15000"

  volumes:
    - ./dags:/opt/airflow/dags
    - ./dbt:/opt/airflow/dbt
    - ./logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy

# ════════════════════════════════════════════════════════════════════════════
# Serwisy
# ════════════════════════════════════════════════════════════════════════════
services:

  # ── PostgreSQL (metadane Airflow) ─────────────────────────────────────────
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER:     airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB:       airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s

  # ── Airflow: inicjalizacja bazy + użytkownik admin ────────────────────────
  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "airflow db migrate &&
               airflow users create
                 --username admin --password admin
                 --firstname Admin --lastname User
                 --role Admin --email admin@example.com"
    restart: "no"

  # ── Airflow: webserver (UI: http://localhost:8080) ────────────────────────
  airflow-webserver:
    <<: *airflow-common
    command: airflow webserver
    ports:
      - "8080:8080"
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  # ── Airflow: scheduler ────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    command: airflow scheduler
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  # ── Kafka broker (KRaft – bez Zookeeper) ─────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    hostname: kafka
    container_name: kafka
    ports:
      - "9094:9094"     # dostęp z hosta (np. kafka_producer.py)
    environment:
      KAFKA_NODE_ID:    1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:9094,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9094"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME:  PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES:   CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS:    1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"   # tematy tworzy kafka-init
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── kafka-init: automatyczne tworzenie topiku przy starcie ────────────────
  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      kafka:
        condition: service_healthy
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        kafka-topics --bootstrap-server kafka:9092 \
          --create --if-not-exists \
          --topic nyc_taxi_events \
          --partitions 1 \
          --replication-factor 1
        echo "Topic nyc_taxi_events gotowy."

  # ── Kafka UI: podgląd topików i wiadomości (http://localhost:8090) ────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME:              local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS:  kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    restart: always

# ════════════════════════════════════════════════════════════════════════════
# Wolumeny
# ════════════════════════════════════════════════════════════════════════════
volumes:
  postgres_data:
  logs:
